services:
  backend:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      CCA_ENVIRONMENT: production
      CCA_LOG_FORMAT: json
      CCA_LOG_LEVEL: INFO
      CCA_CORS_ALLOWED_ORIGINS: ${CCA_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CCA_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CCA_CHROMA_PERSIST_DIR: /app/data/chroma
      CCA_ARTIFACT_DIR: /app/data/artifacts
      CCA_WORKSPACE_SESSION_DB_PATH: /app/data/workspace_sessions.sqlite3
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
