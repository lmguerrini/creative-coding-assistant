<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval'; style-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; font-src 'none'" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05080b;
    }
    #preview-root {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    #preview-root > * {
      position: absolute;
      inset: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #preview-canvas[hidden] {
      display: none;
    }
    #gsap-stage {
      isolation: isolate;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 167, 255, 0.24), transparent 38%),
        radial-gradient(circle at 78% 18%, rgba(76, 215, 200, 0.22), transparent 36%),
        linear-gradient(180deg, #071016 0%, #05080b 52%, #060b12 100%);
    }
    #gsap-stage[hidden] {
      display: none;
    }
    #svg-stage {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      box-sizing: border-box;
      padding: 18px;
      background:
        radial-gradient(circle at 16% 18%, rgba(124, 167, 255, 0.18), transparent 34%),
        radial-gradient(circle at 82% 22%, rgba(76, 215, 200, 0.18), transparent 36%),
        linear-gradient(180deg, #071016 0%, #05080b 56%, #060b12 100%);
    }
    #svg-stage[hidden] {
      display: none;
    }
    #svg-stage .svg-frame {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(237, 243, 242, 0.08);
      border-radius: 24px;
      background: rgba(7, 16, 22, 0.82);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }
    #svg-stage svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    #gsap-stage .gsap-node {
      position: absolute;
      box-sizing: border-box;
      will-change: transform, opacity;
      transform-origin: center center;
      user-select: none;
      pointer-events: none;
    }
    #gsap-stage .backdrop {
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(76, 215, 200, 0.08), transparent 46%);
    }
    #gsap-stage .grid {
      inset: 6%;
      border-radius: 28px;
      border: 1px solid rgba(237, 243, 242, 0.08);
      background-image:
        linear-gradient(rgba(237, 243, 242, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(237, 243, 242, 0.04) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: 0.5;
    }
    #gsap-stage .hero,
    #gsap-stage .panel,
    #gsap-stage .card {
      left: 50%;
      top: 50%;
      width: min(46vw, 420px);
      height: min(32vw, 280px);
      border: 1px solid rgba(237, 243, 242, 0.14);
      border-radius: 32px;
      background:
        linear-gradient(160deg, rgba(124, 167, 255, 0.22), rgba(7, 16, 22, 0.18) 46%, rgba(76, 215, 200, 0.14)),
        rgba(7, 16, 22, 0.72);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      transform: translate3d(-50%, -50%, 0);
    }
    #gsap-stage .title {
      left: 50%;
      top: calc(50% - min(11vw, 92px));
      width: min(40vw, 320px);
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(237, 243, 242, 0.96), rgba(124, 167, 255, 0.94));
      transform: translate3d(-50%, -50%, 0);
      box-shadow: 0 0 26px rgba(124, 167, 255, 0.18);
    }
    #gsap-stage .subtitle {
      left: 50%;
      top: calc(50% - min(4vw, 30px));
      width: min(26vw, 220px);
      height: 10px;
      border-radius: 999px;
      background: rgba(237, 243, 242, 0.42);
      transform: translate3d(-50%, -50%, 0);
    }
    #gsap-stage .ring {
      left: 50%;
      top: 50%;
      border: 1px solid rgba(76, 215, 200, 0.28);
      border-radius: 999px;
      transform: translate3d(-50%, -50%, 0);
      mix-blend-mode: screen;
    }
    #gsap-stage .ring.small {
      width: min(18vw, 150px);
      height: min(18vw, 150px);
    }
    #gsap-stage .ring.medium {
      width: min(28vw, 250px);
      height: min(28vw, 250px);
      border-color: rgba(124, 167, 255, 0.22);
    }
    #gsap-stage .ring.large {
      width: min(40vw, 360px);
      height: min(40vw, 360px);
      border-color: rgba(237, 243, 242, 0.14);
    }
    #gsap-stage .orb,
    #gsap-stage .particle,
    #gsap-stage .dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, rgba(237, 243, 242, 0.92), rgba(76, 215, 200, 0.82) 58%, rgba(76, 215, 200, 0.18) 100%);
      box-shadow: 0 0 22px rgba(76, 215, 200, 0.28);
    }
    #gsap-stage .bar,
    #gsap-stage .line {
      width: 10px;
      height: 110px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(124, 167, 255, 0.92), rgba(76, 215, 200, 0.2));
      transform-origin: center bottom;
    }
    #gsap-stage .chip,
    #gsap-stage .square,
    #gsap-stage .box,
    #gsap-stage .shape {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      background: linear-gradient(160deg, rgba(124, 167, 255, 0.46), rgba(76, 215, 200, 0.18));
      border: 1px solid rgba(237, 243, 242, 0.12);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.24);
    }
    #gsap-stage .column {
      width: 14px;
      height: 160px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(237, 243, 242, 0.4), rgba(124, 167, 255, 0.1));
      transform-origin: center bottom;
    }
    #gsap-stage .accent {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 190, 92, 0.68), rgba(255, 190, 92, 0.08) 72%);
      filter: blur(0px);
      mix-blend-mode: screen;
    }
    #runtime-status {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 2;
      max-width: calc(100% - 20px);
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(5, 8, 11, 0.72);
      color: #edf3f2;
      font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    body[data-show-status-overlay="false"] #runtime-status {
      display: none;
    }
    #audio-controls {
      position: fixed;
      left: 50%;
      bottom: 54px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: rgba(5, 8, 11, 0.82);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      transform: translateX(-50%);
      backdrop-filter: blur(14px);
    }
    #audio-controls[hidden] {
      display: none;
    }
    #audio-controls button {
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #edf3f2;
      cursor: pointer;
      font: 700 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #audio-controls button:hover:not(:disabled),
    #audio-controls button:focus-visible {
      border-color: rgba(76, 215, 200, 0.55);
      background: rgba(76, 215, 200, 0.12);
      outline: none;
    }
    #audio-controls button:disabled {
      cursor: default;
      opacity: 0.42;
    }
    #audio-controls button[aria-pressed="true"] {
      border-color: rgba(255, 190, 92, 0.55);
      color: #ffbe5c;
    }
  </style>
</head>
<body>
  <div id="preview-root">
    <canvas id="preview-canvas"></canvas>
    <div id="gsap-stage" aria-label="GSAP motion stage" hidden></div>
    <div id="svg-stage" aria-label="SVG vector stage" hidden></div>
  </div>
  <div id="audio-controls" aria-label="Tone.js audio controls" hidden>
    <button id="audio-start" type="button">Start audio</button>
    <button id="audio-stop" type="button" disabled>Stop audio</button>
    <button id="audio-mute" type="button" aria-pressed="false" disabled>Mute audio</button>
  </div>
  <pre id="runtime-status">Runtime host waiting</pre>
  <script>
    (function () {
      const messageSource = "cca-preview-runtime";
      const canvas = document.getElementById("preview-canvas");
      const gsapStage = document.getElementById("gsap-stage");
      const svgStage = document.getElementById("svg-stage");
      const root = document.getElementById("preview-root");
      const statusNode = document.getElementById("runtime-status");
      const audioControls = document.getElementById("audio-controls");
      const audioStartButton = document.getElementById("audio-start");
      const audioStopButton = document.getElementById("audio-stop");
      const audioMuteButton = document.getElementById("audio-mute");
      let activeToken = 0;
      let runtime = null;
      let toneProgram = null;
      let toneContext = null;
      let toneMaster = null;
      let toneIntervals = [];
      let toneAnimationFrame = 0;
      let toneMuted = false;
      let toneStartAttempt = 0;
      let gsapAnimations = [];
      let gsapFrameHandle = 0;
      let gsapTimeouts = [];
      let gsapState = null;
      let svgFrameHandle = 0;
      let canvasFrameHandles = new Set();
      let canvasIntervalHandles = new Set();
      let canvasTimeoutHandles = new Set();
      let p5InputCleanup = null;

      function isMountMessage(data) {
        return data &&
          data.source === messageSource &&
          data.type === "mount" &&
          data.runtime &&
          data.runtime.runtimeId === data.runtimeId;
      }

      function isDisposeMessage(data) {
        return data &&
          data.source === messageSource &&
          data.type === "dispose" &&
          runtime &&
          data.runtimeId === runtime.runtimeId;
      }

      function isControlMessage(data) {
        return data &&
          data.source === messageSource &&
          data.type === "control" &&
          runtime &&
          data.runtimeId === runtime.runtimeId &&
          ["start", "stop", "mute", "unmute"].includes(data.action);
      }

      function post(message) {
        if (!runtime) return;
        parent.postMessage(
          Object.assign({
            source: messageSource,
            runtimeId: runtime.runtimeId
          }, message),
          "*"
        );
      }

      function status(state, label, detail, extra) {
        document.body.dataset.runtimeState = state;
        document.body.dataset.runtimeLabel = label;
        statusNode.textContent = label + "\n" + detail;
        post({
          type: "status",
          status: Object.assign({ state, label, detail }, extra || {})
        });
      }

      function fail(error, label) {
        const message = error && error.message ? error.message : String(error);
        activeToken += 1;
        status("error", label || "Runtime failed", message, {
          diagnostics: [message],
          error: {
            debugMessage: error && error.stack ? error.stack : message,
            message,
            type: "preview_sandbox_runtime_failed"
          }
        });
      }

      function rejectSource(message, label) {
        activeToken += 1;
        status("error", label || "Runtime rejected source", message, {
          diagnostics: [message],
          error: {
            debugMessage: message,
            message,
            type: "preview_runtime_source_mismatch"
          }
        });
      }

      function looksLikeHtmlSource(source) {
        const text = String(source || "").trim();
        return (
          /^<!doctype\s+html\b/i.test(text) ||
          /^<html(?:\s|>)/i.test(text) ||
          /^<head(?:\s|>)/i.test(text) ||
          /^<body(?:\s|>)/i.test(text) ||
          /^<(?:script|style|canvas|main|section|div|meta|link)(?:\s|>)/i.test(text)
        );
      }

      function getP5RuntimeSourceSupportIssue(source) {
        if (!looksLikeHtmlSource(source)) return null;
        return "HTML documents cannot run in the p5 JavaScript preview runtime. Use JavaScript p5 source with setup() or draw(), or route the artifact to a compatible preview surface.";
      }

      function disposeActiveRuntime() {
        const previousRuntime = runtime;
        activeToken += 1;
        stopToneAudio(false);
        stopGsapRuntime();
        stopSvgRuntime();
        stopCanvasRuntime();
        if (p5InputCleanup) {
          p5InputCleanup();
          p5InputCleanup = null;
        }
        setToneControlsVisible(false);
        runtime = null;
        document.body.dataset.runtimeState = "idle";
        document.body.dataset.runtimeLabel = "Runtime sandbox disposed";
        document.body.dataset.showStatusOverlay = "true";
        statusNode.textContent = "Runtime sandbox disposed";
        canvas.hidden = false;
        gsapStage.hidden = true;
        svgStage.hidden = true;
        if (previousRuntime && previousRuntime.kind !== "glsl") {
          const context = canvas.getContext("2d");
          if (context) {
            context.clearRect(0, 0, canvas.width, canvas.height);
          }
        }
      }

      function frame(time) {
        post({
          type: "frame",
          renderedAtMs: Number.isFinite(time) ? time : performance.now()
        });
      }

      function resizeCanvas() {
        const dpr = Math.min(devicePixelRatio || 1, 2);
        const rect = root.getBoundingClientRect();
        const width = Math.max(1, Math.floor(rect.width || innerWidth || 640));
        const height = Math.max(1, Math.floor(rect.height || innerHeight || 360));
        const nextWidth = Math.floor(width * dpr);
        const nextHeight = Math.floor(height * dpr);
        if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
          canvas.width = nextWidth;
          canvas.height = nextHeight;
        }
        return { dpr, height, width };
      }

      function normalizeColor(value, fallback) {
        if (typeof value === "number") {
          const next = Math.max(0, Math.min(255, Math.round(value)));
          return "rgb(" + next + "," + next + "," + next + ")";
        }
        if (typeof value === "string") return value;
        if (Array.isArray(value)) {
          const values = value.slice(0, 3).map(function (entry) {
            return Math.max(0, Math.min(255, Math.round(Number(entry) || 0)));
          });
          return "rgb(" + values.join(",") + ")";
        }
        return fallback;
      }

      function resizeCanvasSurface() {
        const rect = root.getBoundingClientRect();
        const width = Math.max(1, Math.floor(rect.width || innerWidth || 640));
        const height = Math.max(1, Math.floor(rect.height || innerHeight || 360));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
        return { height: height, width: width };
      }

      function stopSvgRuntime() {
        if (svgFrameHandle) {
          cancelAnimationFrame(svgFrameHandle);
          svgFrameHandle = 0;
        }
        svgStage.innerHTML = "";
      }

      function stopCanvasRuntime() {
        canvasFrameHandles.forEach(function (handle) {
          cancelAnimationFrame(handle);
        });
        canvasFrameHandles.clear();
        canvasIntervalHandles.forEach(function (handle) {
          window.clearInterval(handle);
        });
        canvasIntervalHandles.clear();
        canvasTimeoutHandles.forEach(function (handle) {
          window.clearTimeout(handle);
        });
        canvasTimeoutHandles.clear();
      }

      function getCanvasSupportIssue(source) {
        if (!source || !source.trim()) {
          return "Canvas preview source is empty.";
        }
        if (source.length > 20000) {
          return "The Canvas source is too large for the bounded preview runtime.";
        }
        if (/\b(?:fetch|XMLHttpRequest|WebSocket|EventSource|Worker|SharedWorker|navigator\.serviceWorker)\b/i.test(source)) {
          return "Remote network access and worker execution are not allowed in the Canvas preview sandbox.";
        }
        if (/\b(?:eval|Function)\s*\(/i.test(source) || /\bimport\s*\(/i.test(source)) {
          return "Dynamic code execution is not allowed in the Canvas preview sandbox.";
        }
        if (/\b(?:document|window)\.(?:body|documentElement|head|write|open|parent|top|location)\b/i.test(source)) {
          return "Canvas previews can only use the bounded preview surface APIs.";
        }
        if (/\b(?:createElement|appendChild|prepend|insertAdjacentHTML|innerHTML|outerHTML)\b/i.test(source)) {
          return "Canvas previews must draw into the provided preview surface instead of mutating the DOM.";
        }
        if (/\b(?:new\s+Image|createImageBitmap|OffscreenCanvas|drawImage|captureStream|toBlob|toDataURL)\b/i.test(source)) {
          return "Canvas preview support is limited to direct 2D drawing without image assets or auxiliary canvases.";
        }
        if (/\baddEventListener\s*\(\s*['"](?:mouse|pointer|touch|key|click|wheel|input)/i.test(source) || /\bon(?:mouse|pointer|touch|key|click|wheel|input)[a-z]*\s*=/i.test(source)) {
          return "Canvas preview support is limited to deterministic animation without interactive input handlers.";
        }
        if (/https?:\/\//i.test(source)) {
          return "Remote assets are not allowed in the Canvas preview sandbox.";
        }
        return null;
      }

      function getSvgSupportIssue(source) {
        if (!source || !source.trim()) {
          return "SVG preview source is empty.";
        }
        if (source.length > 40000) {
          return "The SVG source is too large for the bounded preview runtime.";
        }
        if (!/<svg[\s>]/i.test(source)) {
          return "SVG preview source must contain an <svg> root element.";
        }
        if (/<(?:script|foreignObject|iframe|object|embed)\b/i.test(source)) {
          return "SVG preview support is limited to sanitized inline SVG markup without scriptable DOM containers.";
        }
        if (/\bon[a-z]+\s*=/i.test(source)) {
          return "SVG preview support is limited to sanitized inline SVG markup without event handlers.";
        }
        if (/\b(?:javascript:|data:text\/html)/i.test(source)) {
          return "SVG previews cannot embed executable URLs.";
        }
        if (/<(?:image|audio|video)\b/i.test(source)) {
          return "SVG preview support is limited to self-contained vector markup without external media assets.";
        }
        if (/https?:\/\/(?!www\.w3\.org\/2000\/svg\b)/i.test(source)) {
          return "Remote assets are not allowed in the SVG preview sandbox.";
        }
        return null;
      }

      function stopGsapRuntime() {
        if (gsapFrameHandle) {
          cancelAnimationFrame(gsapFrameHandle);
          gsapFrameHandle = 0;
        }
        gsapTimeouts.forEach(function (timer) {
          window.clearTimeout(timer);
        });
        gsapTimeouts = [];
        gsapAnimations.forEach(function (animation) {
          try {
            animation.cancel();
          } catch (error) {}
        });
        gsapAnimations = [];
        gsapState = null;
        gsapStage.innerHTML = "";
      }

      function startGsap(token) {
        const supportIssue = getGsapSupportIssue(runtime.source.source);
        if (supportIssue) throw new Error(supportIssue);

        canvas.hidden = true;
        gsapStage.hidden = false;
        const stage = buildGsapStage();
        const sandboxDocument = createGsapSandboxDocument(stage);
        const sandboxWindow = createGsapSandboxWindow(stage, sandboxDocument);
        const gsap = createGsapFacade(stage);

        new Function(
          "gsap",
          "document",
          "window",
          "console",
          "requestAnimationFrame",
          "cancelAnimationFrame",
          "performance",
          "'use strict'; const self = window; const parent = undefined; const top = undefined; const globalThis = undefined;\n" +
            runtime.source.source
        )(
          gsap.api,
          sandboxDocument,
          sandboxWindow,
          console,
          requestAnimationFrame.bind(window),
          cancelAnimationFrame.bind(window),
          performance
        );

        const started = gsap.start();
        if (started.tweenCount === 0) {
          throw new Error("GSAP source did not schedule any supported tweens or timelines.");
        }

        gsapState = started;
        status(
          "running",
          "GSAP runtime running",
          "Animating " + runtime.source.title + " inside a bounded GSAP motion stage.",
          { diagnostics: started.diagnostics }
        );
        startGsapFrameLoop(token);
      }

      function startGsapFrameLoop(token) {
        if (gsapFrameHandle) {
          cancelAnimationFrame(gsapFrameHandle);
        }

        function loop(time) {
          if (token !== activeToken || !runtime || runtime.kind !== "gsap") {
            gsapFrameHandle = 0;
            return;
          }

          if (!hasActiveGsapAnimations()) {
            gsapFrameHandle = 0;
            if (gsapState && !gsapState.hasInfiniteAnimation) {
              status(
                "stopped",
                "GSAP runtime stopped",
                "All scheduled GSAP tweens completed."
              );
            }
            return;
          }

          frame(time);
          gsapFrameHandle = requestAnimationFrame(loop);
        }

        gsapFrameHandle = requestAnimationFrame(loop);
      }

      function hasActiveGsapAnimations() {
        return gsapAnimations.some(function (animation) {
          return animation.playState === "running" || animation.playState === "pending";
        });
      }

      function buildGsapStage() {
        gsapStage.innerHTML = "";
        const created = [];

        function appendNode(className, options) {
          const element = document.createElement("div");
          element.className = "gsap-node " + className;
          if (options && options.id) element.id = options.id;
          element.dataset.baseTransform = options && options.baseTransform
            ? options.baseTransform
            : "translate3d(0px, 0px, 0px)";
          element.style.transform = element.dataset.baseTransform;
          if (options && options.left != null) element.style.left = options.left;
          if (options && options.top != null) element.style.top = options.top;
          if (options && options.width != null) {
            element.style.width = typeof options.width === "number"
              ? options.width + "px"
              : options.width;
          }
          if (options && options.height != null) {
            element.style.height = typeof options.height === "number"
              ? options.height + "px"
              : options.height;
          }
          if (options && options.text) {
            element.textContent = options.text;
            element.style.background = "none";
            element.style.color = "#edf3f2";
            element.style.font = options.font || "700 16px/1 ui-monospace, SFMono-Regular, Menlo, monospace";
            element.style.letterSpacing = "0.08em";
            element.style.textTransform = "uppercase";
          }
          gsapStage.appendChild(element);
          created.push(element);
          return element;
        }

        appendNode("backdrop layer", { id: "backdrop" });
        appendNode("grid layer", { id: "grid", left: "0", top: "0" });
        appendNode("accent glow layer", {
          id: "accent",
          left: "16%",
          top: "18%"
        });
        appendNode("hero panel card box shape", {
          id: "hero",
          left: "50%",
          top: "50%",
          baseTransform: "translate3d(-50%, -50%, 0)"
        });
        appendNode("title copy line", {
          id: "title",
          left: "50%",
          top: "50%",
          baseTransform: "translate3d(-50%, -50%, 0)"
        });
        appendNode("subtitle copy line", {
          id: "subtitle",
          left: "50%",
          top: "50%",
          baseTransform: "translate3d(-50%, -50%, 0)"
        });
        appendNode("ring large", {
          id: "ring-large",
          left: "50%",
          top: "50%",
          baseTransform: "translate3d(-50%, -50%, 0)"
        });
        appendNode("ring medium", {
          id: "ring-medium",
          left: "50%",
          top: "50%",
          baseTransform: "translate3d(-50%, -50%, 0)"
        });
        appendNode("ring small", {
          id: "ring-small",
          left: "50%",
          top: "50%",
          baseTransform: "translate3d(-50%, -50%, 0)"
        });

        const orbPositions = [
          ["18%", "26%"],
          ["74%", "20%"],

          const gradient = context.createLinearGradient(0, 0, size.width, size.height);
          gradient.addColorStop(0, "#071313");
          gradient.addColorStop(1, "#080b14");
          context.fillStyle = gradient;
          context.fillRect(0, 0, size.width, size.height);
          const bars = Math.min(48, Math.max(16, Math.floor(size.width / 18)));
          const gap = 4;
          const barWidth = Math.max(2, (size.width - gap * (bars + 1)) / bars);
          for (let index = 0; index < bars; index += 1) {
            const phase = time * 0.002 + index * 0.67;
            const energy = toneMuted ? 0.08 : 0.18 + Math.abs(Math.sin(phase)) * 0.68;
            const barHeight = Math.max(3, size.height * energy * (0.45 + (index % 7) * 0.06));
            context.fillStyle = index % 3 === 0 ? "#7ca7ff" : "#4cd7c8";
            context.globalAlpha = toneMuted ? 0.25 : 0.42 + energy * 0.5;
            context.fillRect(
              gap + index * (barWidth + gap),
              size.height - barHeight,
              barWidth,
              barHeight
            );
          }
          context.globalAlpha = 1;
          frame(time);
          toneAnimationFrame = requestAnimationFrame(loop);
        }
        toneAnimationFrame = requestAnimationFrame(loop);
      }

      function drawToneIdle(context) {
        const size = resizeCanvas();
        context.setTransform(size.dpr, 0, 0, size.dpr, 0, 0);
        const gradient = context.createLinearGradient(0, 0, size.width, size.height);
        gradient.addColorStop(0, "#071313");
        gradient.addColorStop(1, "#080b14");
        context.fillStyle = gradient;
        context.fillRect(0, 0, size.width, size.height);
        context.strokeStyle = "rgba(76, 215, 200, 0.32)";
        context.lineWidth = 1;
        context.beginPath();
        for (let index = 0; index <= 80; index += 1) {
          const x = index / 80 * size.width;
          const y = size.height * 0.5 + Math.sin(index * 0.42) * size.height * 0.055;
          if (index === 0) context.moveTo(x, y);
          else context.lineTo(x, y);
        }
        context.stroke();
      }

      function subdivisionSeconds(subdivision, tempo) {
        const quarter = 60 / Math.max(40, Math.min(220, Number(tempo) || 96));
        const multipliers = {
          "1m": 4,
          "2n": 2,
          "4n": 1,
          "8n": 0.5,
          "16n": 0.25,
          "32n": 0.125
        };
        return quarter * (multipliers[subdivision] || 0.5);
      }

      function noteFrequency(note) {
        const match = /^([A-Ga-g])([#b]?)(-?\d)$/.exec(note);
        if (!match) return 220;
        const semitones = {
          C: 0,
          D: 2,
          E: 4,
          F: 5,
          G: 7,
          A: 9,
          B: 11
        };
        let midi = (Number(match[3]) + 1) * 12 + semitones[match[1].toUpperCase()];
        if (match[2] === "#") midi += 1;
        if (match[2] === "b") midi -= 1;
        return 440 * Math.pow(2, (midi - 69) / 12);
      }

      function normalizeToneWaveform(waveform, kind) {
        if (kind === "metal") return "square";
        return ["sine", "square", "triangle", "sawtooth"].includes(waveform)
          ? waveform
          : "sine";
      }

      function createDistortionCurve(amount) {
        const samples = 256;
        const curve = new Float32Array(samples);
        const drive = 1 + amount * 24;
        for (let index = 0; index < samples; index += 1) {
          const x = index * 2 / samples - 1;
          curve[index] = Math.tanh(x * drive);
        }
        return curve;
      }

      function createReverbImpulse(context, amount) {
        const length = Math.max(1, Math.floor(context.sampleRate * amount));
        const impulse = context.createBuffer(2, length, context.sampleRate);
        for (let channelIndex = 0; channelIndex < impulse.numberOfChannels; channelIndex += 1) {
          const channel = impulse.getChannelData(channelIndex);
          for (let index = 0; index < length; index += 1) {
            channel[index] =
              (Math.random() * 2 - 1) * Math.pow(1 - index / length, 2.4);
          }
        }
        return impulse;
      }

      function createProgram(gl, vertexSource, fragmentSource) {
        const vertex = compileShader(gl, gl.VERTEX_SHADER, vertexSource);
        const fragment = compileShader(gl, gl.FRAGMENT_SHADER, fragmentSource);
        const program = gl.createProgram();
        gl.attachShader(program, vertex);
        gl.attachShader(program, fragment);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          throw new Error(gl.getProgramInfoLog(program) || "Shader program did not link.");
        }
        return program;
      }

      function compileShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(shader) || "Shader did not compile.");
        }
        return shader;
      }

      function mountRuntime(nextRuntime) {
        disposeActiveRuntime();
        runtime = nextRuntime;
        document.body.dataset.showStatusOverlay =
          nextRuntime.showStatusOverlay === false ? "false" : "true";
        activeToken += 1;
        const token = activeToken;
        try {
          status("starting", "Runtime sandbox mounted", "Sandbox document loaded for " + runtime.source.title + ".");
          if (runtime.kind === "p5") startP5(token);
          else if (runtime.kind === "three") startThree(token);
          else if (runtime.kind === "hydra") startHydra(token);
          else if (runtime.kind === "tone") setupTone(token);
          else if (runtime.kind === "gsap") startGsap(token);
          else if (runtime.kind === "svg") startSvg(token);
          else if (runtime.kind === "canvas") startCanvas(token);
          else startGlsl(token);
        } catch (error) {
          fail(error, runtime.kind === "glsl" ? "GLSL runtime failed" : runtime.kind === "three" ? "Three.js runtime failed" : runtime.kind === "hydra" ? "Hydra runtime failed" : runtime.kind === "tone" ? "Tone.js runtime failed" : runtime.kind === "gsap" ? "GSAP runtime failed" : runtime.kind === "svg" ? "SVG runtime failed" : runtime.kind === "canvas" ? "Canvas runtime failed" : "p5 runtime failed");
        }
      }

      audioStartButton.addEventListener("click", function () {
        startToneAudio(activeToken);
      });
      audioStopButton.addEventListener("click", function () {
        stopToneAudio(true);
      });
      audioMuteButton.addEventListener("click", function () {
        setToneMuted(!toneMuted);
      });

      window.addEventListener("message", function (event) {
        if (isDisposeMessage(event.data)) {
          disposeActiveRuntime();
          return;
        }
        if (isControlMessage(event.data)) {
          if (event.data.action === "start") startToneAudio(activeToken);
          else if (event.data.action === "stop") stopToneAudio(true);
          else if (event.data.action === "mute") setToneMuted(true);
          else if (event.data.action === "unmute") setToneMuted(false);
          return;
        }
        if (isMountMessage(event.data)) {
          mountRuntime(event.data.runtime);
        }
      });

      if (location.hash.length > 1) {
        try {
          mountRuntime(JSON.parse(decodeURIComponent(location.hash.slice(1))));
        } catch (error) {
          runtime = {
            kind: "p5",
            runtimeId: "direct-preview-runtime",
            source: { title: "Direct runtime payload", source: "" }
          };
          fail(error, "Runtime payload failed");
        }
      }
    })();
  </script>
</body>
</html>
