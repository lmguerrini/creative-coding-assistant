name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Backend static gates
        run: |
          git diff --check
          python -m compileall src tests scripts

      - name: Backend full pytest
        run: pytest --cov=creative_coding_assistant --cov-report=term-missing --cov-report=xml

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: error

  dependency-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install production backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server]"

      - name: Verify Chroma dependency posture
        run: python -c "from creative_coding_assistant.api.production import build_dependency_health_report; report = build_dependency_health_report(); assert report.status == 'ready', report.model_dump(mode='json')"

      - name: Audit backend dependencies
        run: python -m pip_audit --progress-spinner off --strict --desc

  runtime-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Runtime docs and dashboard gates
        run: |
          python scripts/v7_quality_gates.py docs-mermaid
          python scripts/v7_quality_gates.py dashboard --output test-results/v7-quality-dashboard.json

      - name: Backend log gate smoke
        shell: bash
        run: |
          mkdir -p test-results
          set +e
          timeout 8s python -m creative_coding_assistant.api.dev_server --host 127.0.0.1 --port 8014 > test-results/backend-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 124 ] && [ "$status" -ne 0 ]; then
            cat test-results/backend-smoke.log
            exit "$status"
          fi
          python scripts/v7_quality_gates.py backend-log test-results/backend-smoke.log

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/nextjs/package-lock.json

      - name: Install frontend dependencies
        working-directory: clients/nextjs
        run: npm ci

      - name: Install Playwright browser
        working-directory: clients/nextjs
        run: npx playwright install --with-deps chromium

      - name: Frontend unit and type gates
        working-directory: clients/nextjs
        run: |
          npm run typecheck
          npm run test

      - name: Playwright E2E gates
        working-directory: clients/nextjs
        run: npm run test:e2e

  quality:
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - dependency-security
      - runtime-quality
      - frontend-quality
    if: ${{ always() }}
    timeout-minutes: 5

    steps:
      - name: Verify split quality jobs
        run: |
          test "${{ needs.backend-quality.result }}" = "success"
          test "${{ needs.dependency-security.result }}" = "success"
          test "${{ needs.runtime-quality.result }}" = "success"
          test "${{ needs.frontend-quality.result }}" = "success"
