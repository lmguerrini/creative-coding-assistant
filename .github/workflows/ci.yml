name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Backend static gates
        run: |
          git diff --check
          ruff check src tests scripts
          python -m compileall src tests scripts

      - name: Backend fast pytest
        run: |
          pytest \
            tests/test_v7_7_production_deployment_foundation.py \
            tests/test_v7_5_production_api_runtime_stabilization.py \
            tests/test_v7_9_runtime_validation_integration.py \
            tests/test_nextjs_streaming_bridge.py \
            tests/test_workspace_session_persistence.py \
            --cov=creative_coding_assistant \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload backend fast coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-fast-coverage-xml
          path: coverage.xml
          if-no-files-found: error

  backend-release-verification:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') }}
    timeout-minutes: 150

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Backend release static gates
        run: |
          git diff --check
          ruff check src tests scripts
          python -m compileall src tests scripts

      - name: Backend full pytest release gate
        run: pytest --cov=creative_coding_assistant --cov-report=term-missing --cov-report=xml

      - name: Upload backend full coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-full-coverage-xml
          path: coverage.xml
          if-no-files-found: error

  dependency-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install production backend dependencies and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[server]"
          python -m pip install "pip-audit>=2.7"

      - name: Verify Chroma dependency posture
        run: python -c "from creative_coding_assistant.api.production import build_dependency_health_report; report = build_dependency_health_report(); assert report.status == 'ready', report.model_dump(mode='json')"

      - name: Build third-party audit requirements
        run: |
          python -m pip freeze --exclude-editable --exclude creative-coding-assistant > audit-requirements.txt
          python -c "from pathlib import Path; lines=[line.strip() for line in Path('audit-requirements.txt').read_text(encoding='utf-8').splitlines() if line.strip() and not line.startswith('#')]; leaked=[line for line in lines if line.lower().startswith('creative-coding-assistant')]; assert lines, 'third-party audit requirements are empty'; assert not leaked, 'local project package leaked into audit requirements: ' + ', '.join(leaked); print(f'Prepared {len(lines)} third-party packages for pip-audit')"

      - name: Audit backend dependencies
        run: python -m pip_audit -r audit-requirements.txt --progress-spinner off --strict --desc

  runtime-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Runtime docs and dashboard gates
        run: |
          python scripts/v7_quality_gates.py docs-mermaid
          python scripts/v7_quality_gates.py dashboard --output test-results/v7-quality-dashboard.json

      - name: Backend log gate smoke
        shell: bash
        run: |
          mkdir -p test-results
          set +e
          timeout 8s python -m creative_coding_assistant.api.dev_server --host 127.0.0.1 --port 8014 > test-results/backend-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 124 ] && [ "$status" -ne 0 ]; then
            cat test-results/backend-smoke.log
            exit "$status"
          fi
          python scripts/v7_quality_gates.py backend-log test-results/backend-smoke.log

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/nextjs/package-lock.json

      - name: Install frontend dependencies
        working-directory: clients/nextjs
        run: npm ci

      - name: Install Playwright browser
        working-directory: clients/nextjs
        run: npx playwright install --with-deps chromium

      - name: Frontend unit and type gates
        working-directory: clients/nextjs
        run: |
          npm run typecheck
          npm run test

      - name: Playwright E2E gates
        working-directory: clients/nextjs
        run: npm run test:e2e

  quality:
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-release-verification
      - dependency-security
      - runtime-quality
      - frontend-quality
    if: ${{ always() }}
    timeout-minutes: 5

    steps:
      - name: Verify split quality jobs
        run: |
          test "${{ needs.backend-quality.result }}" = "success"
          test "${{ needs.dependency-security.result }}" = "success"
          test "${{ needs.runtime-quality.result }}" = "success"
          test "${{ needs.frontend-quality.result }}" = "success"
          if [ "${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            test "${{ needs.backend-release-verification.result }}" = "success"
          else
            test "${{ needs.backend-release-verification.result }}" = "skipped"
          fi
