name: Backend Release Verification

on:
  workflow_dispatch:
  push:
    branches:
      - "version-review/**"
      - "version-freeze/**"

jobs:
  backend-release-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Backend release static gates
        run: |
          git diff --check
          ruff check src tests scripts
          python -m compileall src tests scripts

      - name: Backend full pytest release gate
        run: pytest --cov=creative_coding_assistant --cov-report=term-missing --cov-report=xml

      - name: Upload backend full coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-full-coverage-xml
          path: coverage.xml
          if-no-files-found: error
